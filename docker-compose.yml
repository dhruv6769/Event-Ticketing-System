version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_password
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ticket_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ticket_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://ticket_user:ticket_password@postgres:5432/ticket_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey_for_dev_only
      - JWT_REFRESH_SECRET=supersecretjwtrefreshkey_for_dev_only
      - PORT=5000
    depends_on:
      - postgres
      - redis
    networks:
      - ticket_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - ticket_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  ticket_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
